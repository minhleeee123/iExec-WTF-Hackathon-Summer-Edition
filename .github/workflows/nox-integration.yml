name: Nox Runtime Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read

concurrency:
  group: nox-runtime-integration
  cancel-in-progress: false

jobs:
  runtime:
    name: Local Nox stack and bytecode E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: source-code/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: source-code/backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Compile contracts
        run: npm run compile
      - name: Run Nox runtime integration suite
        run: npm run test:nox
      - name: Upload Nox service diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: nox-runtime-logs-${{ github.run_id }}
          path: source-code/backend/offchain-services.log
          if-no-files-found: warn
          retention-days: 14
